<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>小松30-2期 参加者一覧</title>
  <style>
    /* * --- フォント設定 --- */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
    
    body {
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      color: #333333;
      background-color: #f5f7f8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding-bottom: 2rem;
    }
    
    /* * --- タイトルフォント --- */
    .title-font {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      color: #ffffff;
    }
    
    /* * --- カードデザイン --- */
    .card {
      background: #ffffff;
      border: 1px solid #e0eaec;
      position: relative;
      box-shadow: 0 2px 12px rgba(30, 110, 125, 0.08);
      transition: all 0.3s ease;
      overflow: hidden;
      border-radius: 0.75rem;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, #e84886, #f5e140, #46c8e0);
      border-radius: 0.75rem 0 0 0.75rem;
    }

    /* * --- カード操作時 --- */
    .card:active {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(30, 110, 125, 0.15);
    }
    
    /* * --- 展開ボタン --- */
    .expand-button {
      position: relative;
      transition: all 0.3s ease;
      padding-right: 2.5rem;
      padding-left: 0.75rem;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      color: #222222;
    }
    
    .expand-button:active {
      color: #1e7a8c;
    }
    
    /* 展開ボタンの矢印 (▼) */
    .expand-button::after {
      content: '▼';
      position: absolute;
      right: 0.8rem;
      top: 50%;
      transform: translateY(-50%) scale(0.8);
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      font-size: 0.85rem;
      color: #1e7a8c;
    }
    
    .expand-button.expanded::after {
      transform: translateY(-50%) rotate(180deg) scale(0.8);
    }
    
    /* * --- 詳細コンテンツ --- */
    .detail-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s ease-in-out;
    }
    
    .detail-content.show {
      max-height: 800px;
    }
    
    .detail-section {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease-out;
    }
    
    .detail-section.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* * --- アクセントライン --- */
    .accent-line {
      width: 3px;
      background: linear-gradient(180deg, #e84886, #46c8e0);
      border-radius: 2px;
    }
    
    /* * --- ヘッダー --- */
    .header-container {
      position: relative;
      padding: 1rem 1rem 1.75rem;
      text-align: center;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #1e7a8c, #1a5f7a);
      border-radius: 0 0 1.5rem 1.5rem;
      box-shadow: 0 4px 20px rgba(30, 110, 125, 0.25);
    }

    .header-container::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 50%;
      height: 3px;
      background: linear-gradient(90deg, #e84886, #f5e140, #46c8e0, #b594d4);
      border-radius: 2px;
    }
    
    .loading {
      animation: fadeInOut 1.5s infinite;
    }
    
    @keyframes fadeInOut {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    /* 区切り線 */
    .divider {
      height: 1px;
      background: #e8f0f2;
      margin: 0.5rem 0 0.5rem 0.75rem;
    }
    
    /* ふりがな */
    .kana-text {
      color: #6b8a90;
      font-weight: 300;
    }
    
    /* 詳細ラベル */
    .label-text {
      color: #1e7a8c;
      font-weight: 600;
      font-size: 0.7rem;
      letter-spacing: 1px;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      border-left: 3px solid #46c8e0;
      padding-left: 0.5rem;
    }
    
    /* 詳細内容 */
    .content-text {
      color: #444444;
      line-height: 1.8;
      font-weight: 300;
      font-size: 0.9rem;
    }

    /* 属性バッジ */
    .category-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      margin-top: 0.3rem;
      letter-spacing: 0.5px;
    }
    .badge-admin   { background: #e0f4f7; color: #1e7a8c; }
    .badge-company { background: #fff0f6; color: #c0316a; }
    .badge-citizen { background: #fffbe6; color: #a07800; }
    
    /* スマホ最適化 */
    @media (max-width: 640px) {
      .card {
        margin: 0;
        border-radius: 0.5rem;
      }
      
      .expand-button {
        font-size: 0.95rem;
        padding: 0.6rem 2.5rem 0.6rem 0.75rem;
      }

      .title-font {
        font-size: 1.6rem;
      }

      .header-container {
        border-radius: 0 0 1rem 1rem;
      }
    }
  </style>
</head>
<body class="px-3">
  <div class="max-w-md mx-auto">
    <!-- Header --><div class="header-container">
      <h1 class="title-font text-3xl font-bold mb-2">小松をつなげる30人<br>2期 参加者一覧</h1>
      <p class="text-sm font-light tracking-widest" style="color: rgba(255,255,255,0.75);">— お名前をタップして詳細表示 —</p>
    </div>
    
    <!-- Loading State --><div id="loading" class="text-center py-8">
      <div class="loading text-sm font-light" style="color: #1e7a8c;">Now loading...</div>
    </div>
    
    <!-- Main Content --><div id="app" class="space-y-4"></div>
  </div>

<script>
  /* * --- JavaScript ---
   * 機能は変更せず、そのまま流用しています
   */
  fetch('https://script.google.com/macros/s/AKfycbx-bRMNBwpy-wQ2fwi09fTHpqAGDTiYJpKGDblPxOmoGsJDEsTFgXuPsKUtwtsB7xkMyw/exec')
    .then(res => res.json())
    .then(rawData => {
      const app = document.getElementById("app");
      const loading = document.getElementById("loading");
      
      // Hide loading
      loading.style.display = 'none';

      // Debug: Log the first item to see available fields
      console.log('Available fields in data:', rawData[0] ? Object.keys(rawData[0]) : 'No data');
      console.log('Sample data:', rawData[0]);

      // Map data to new keys and sort
      const data = rawData
        .map(p => ({
          lastName: p['姓'],
          firstName: p['名'],
          lastNameKana: p['せい'],
          firstNameKana: p['めい'],
          affiliation: p['所属'],
          category: p['属性'],
          comment: p['コメント']
        }))
        .sort((a, b) => {
          const nameA = `${a.lastNameKana} ${a.firstNameKana}`;
          const nameB = `${b.lastNameKana} ${b.firstNameKana}`;
          return nameA.localeCompare(nameB, 'ja');
        });
      
      data.forEach((person, index) => {
        const section = document.createElement("div");
        section.className = "card p-4";
        
        // HTML構造は元のまま、クラスが新しいCSSを読み込みます
        section.innerHTML = `
          <button class="expand-button w-full text-left font-medium text-base pb-1" 
                  onclick="toggleDetail(${index})">
            <div class="mb-1">
              <span class="font-bold text-lg" style="color: #1a3a40;">${person.lastName} ${person.firstName}</span>
              <span class="kana-text ml-2 text-sm">（${person.lastNameKana} ${person.firstNameKana}）</span>
            </div>
            <div class="text-sm font-normal" style="color: #4a7a84;">${person.affiliation}</div>
          </button>
          
          <div class="divider"></div>
          
          <div id="detail${index}" class="detail-content">
            <div class="pt-3 space-y-4">
              ${person.comment ? `
              <div class="detail-section flex items-start">
                <div class="accent-line mr-3 mt-1" style="min-height: 60px;"></div>
                <div class="flex-1">
                  <div class="label-text">コメント</div>
                  <div class="content-text" style="white-space: pre-wrap;">${person.comment}</div>
                </div>
              </div>
              ` : ''}
            </div>
          </div>
        `;
        
        app.appendChild(section);
      });
    })
    .catch(error => {
      console.error("データの読み込みに失敗しました:", error);
      const loading = document.getElementById("loading");
      loading.innerHTML = '<div class="text-red-400">データの読み込みに失敗しました</div>';
    });
    
  function toggleDetail(index) {
    const detail = document.getElementById(`detail${index}`);
    const button = detail.closest('.card').querySelector('.expand-button');
    const detailSections = detail.querySelectorAll('.detail-section');
    
    if (detail.classList.contains('show')) {
      // Hide
      detail.classList.remove('show');
      if(button) button.classList.remove('expanded');
      detailSections.forEach(section => section.classList.remove('show'));
    } else {
      // Show
      detail.classList.add('show');
      if(button) button.classList.add('expanded');
      
      // Animate sections with staggered delay
      detailSections.forEach((section, i) => {
        setTimeout(() => {
          section.classList.add('show');
        }, i * 100);
      });
    }
  }
</script>

</body>
</html>
